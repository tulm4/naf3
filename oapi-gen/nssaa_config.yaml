# oapi-codegen config for NSSAAF NSSAA API
# Generates spec-compliant types and chi-server HTTP handlers.
# Spec: TS 29.526 v18.x
package: nssaa
output: gen/nssaa/nssaa.gen.go
generate:
  - types
  - chi-server
import-mapping:
  TS29571_CommonData.yaml: github.com/operator/nssAAF/oapi-gen/gen/specs
  TS29509_Nausf_UEAuthentication.yaml: github.com/operator/nssAAF/oapi-gen/gen/specs
