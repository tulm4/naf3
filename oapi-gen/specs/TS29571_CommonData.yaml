openapi: 3.0.0

info:
  version: '1.5.0-alpha.6'
  title: 'Common Data Types (NSSAAF stripped)'
  description: |
    Subset of TS 29.571 Common Data Types for NSSAAF API code generation.
    Spec: TS 29.571 v18.5.0

paths: {}

components:

  schemas:

    # --- SIMPLE STRING TYPES ---

    SupportedFeatures:
      type: string
      pattern: '^[A-Fa-f0-9]*$'
      description: >
        A string used to indicate the features supported by an API that is used as defined in clause
        6.6 in 3GPP TS 29.500. The string shall contain a bitmask indicating supported features in
        hexadecimal representation. Each character in the string shall take a value of "0" to "9",
        "a" to "f" or "A" to "F" and shall represent the support of 4 features.

    Uri:
      type: string
      description: String providing an URI formatted according to RFC 3986.

    NfInstanceId:
      type: string
      format: uuid
      description: >
        String uniquely identifying a NF instance. The format of the NF Instance ID shall be a
        Universally Unique Identifier (UUID) version 4, as described in IETF RFC 4122.

    Gpsi:
      type: string
      pattern: '^(msisdn-[0-9]{5,15}|extid-[^@]+@[^@]+|.+)$'
      description: >
        String identifying a Gpsi shall contain either an External Id or an MSISDN.
        It shall be formatted as follows - External Identifier= "extid-'extid', where 'extid'
        shall be formatted according to clause 19.7.2 of 3GPP TS 23.003.

    Supi:
      type: string
      pattern: '^(imsi-[0-9]{5,15}|nai-.+|gci-.+|gli-.+|.+)$'
      description: |
        String identifying a Supi that shall contain either an IMSI, a network specific identifier,
        a Global Cable Identifier (GCI) or a Global Line Identifier (GLI) as specified in clause
        2.2A of 3GPP TS 23.003.

    # --- PLMN identifiers (needed by Snssai) ---

    Mcc:
      type: string
      pattern: '^\d{3}$'
      description: >
        Mobile Country Code part of the PLMN, comprising 3 digits, as defined in clause 9.3.3.5
        of 3GPP TS 38.413.

    Mnc:
      type: string
      pattern: '^\d{2,3}$'
      description: >
        Mobile Network Code part of the PLMN, comprising 2 or 3 digits, as defined in
        clause 9.3.3.5 of 3GPP TS 38.413.

    PlmnId:
      type: object
      properties:
        mcc:
          $ref: '#/components/schemas/Mcc'
        mnc:
          $ref: '#/components/schemas/Mnc'
      required:
        - mcc
        - mnc

    # --- S-NSSAI (Slice/Service Type) ---

    Snssai:
      type: object
      properties:
        sst:
          type: integer
          minimum: 0
          maximum: 255
          description: >
            Unsigned integer, within the range 0 to 255, representing the Slice/Service Type.
            Values 0 to 127 correspond to the standardized SST range. Values 128 to 255 correspond
            to the Operator-specific range. See clause 28.4.2 of 3GPP TS 23.003.
            Standardized values are defined in clause 5.15.2.2 of 3GPP TS 23.501.
        sd:
          type: string
          pattern: '^[A-Fa-f0-9]{6}$'
          description: >
            3-octet string, representing the Slice Differentiator, in hexadecimal representation.
            This is an optional parameter that complements the Slice/Service type(s) to allow to
            differentiate amongst multiple Network Slices of the same Slice/Service type.
      required:
        - sst

    # --- IP address types ---

    Ipv4Addr:
      type: string
      pattern: '^(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])$'
      description: >
        String identifying an IPv4 address formatted in the 'dotted decimal' notation
        as defined in RFC 1166.

    Ipv6Addr:
      type: string
      allOf:
        - pattern: '^((:|(0?|([1-9a-f][0-9a-f]{0,3}))):)((0?|([1-9a-f][0-9a-f]{0,3})):){0,6}(:|(0?|([1-9a-f][0-9a-f]{0,3})))$'
        - pattern: '^((([^:]+:){7}([^:]+))|((([^:]+:)*[^:]+)?::(([^:]+:)*[^:]+)?))$'
      description: >
        String identifying an IPv6 address formatted according to clause 4 of RFC5952.

    Fqdn:
      description: Fully Qualified Domain Name
      type: string
      pattern: '^([0-9A-Za-z]([-0-9A-Za-z]{0,61}[0-9A-Za-z])?\.)+[A-Za-z]{2,63}\.?$'
      minLength: 4
      maxLength: 253

    # --- Complex types ---

    RedirectResponse:
      description: >
        The response shall include a Location header field containing a different URI
        (pointing to a different URI of an other service instance), or the same URI if a request
        is redirected to the same target resource via a different SCP.
      type: object
      properties:
        cause:
          type: string
        targetScp:
          $ref: '#/components/schemas/Uri'
        targetSepp:
          $ref: '#/components/schemas/Uri'

    ServerAddressingInfo:
      description: Contains addressing information (IP addresses and/or FQDNs) of a server.
      type: object
      anyOf:
        - required:
          - ipv4Addresses
        - required:
          - ipv6Addresses
        - required:
          - fqdnList
      properties:
        ipv4Addresses:
          type: array
          items:
            $ref: '#/components/schemas/Ipv4Addr'
          minItems: 1
        ipv6Addresses:
          type: array
          items:
            $ref: '#/components/schemas/Ipv6Addr'
          minItems: 1
        fqdnList:
          type: array
          items:
            $ref: '#/components/schemas/Fqdn'
          minItems: 1

    AuthStatus:
      anyOf:
        - type: string
          enum:
            - EAP_SUCCESS
            - EAP_FAILURE
            - PENDING
        - type: string
          description: >
            This string provides forward-compatibility with future
            extensions to the enumeration but is not used to encode
            content defined in the present version of this API.
      description: |
        Possible values are:
        - "EAP_SUCCESS": The NSSAA status is EAP-Success.
        - "EAP_FAILURE": The NSSAA status is EAP-Failure.
        - "PENDING": The NSSAA status is Pending.

    # --- Stub for ProblemDetails (will be replaced with internal type) ---
    ProblemDetails:
      type: object
      properties:
        type:
          type: string
          description: URI referencing the problem type
        title:
          type: string
          description: Short human-readable problem summary
        status:
          type: integer
          description: HTTP status code
        detail:
          type: string
          description: Human-readable problem detail
        instance:
          type: string
          description: URI that identified the specific problem occurrence
      description: >
        Problem details with additional 3GPP-specific fields.
        NOTE: This is a stub. The actual ProblemDetails type from internal/api/common
        will be used via a type alias in the generated code.

  responses:

    '307':
      description: Temporary Redirect
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RedirectResponse'
      headers:
        Location:
          description: 'The URI pointing to the resource located on the redirect target'
          required: true
          schema:
            type: string
        3gpp-Sbi-Target-Nf-Id:
          description: 'Identifier of target NF (service) instance towards which the request is redirected'
          schema:
            type: string

    '308':
      description: Permanent Redirect
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RedirectResponse'
      headers:
        Location:
          description: 'The URI pointing to the resource located on the redirect target'
          required: true
          schema:
            type: string
        3gpp-Sbi-Target-Nf-Id:
          description: 'Identifier of target NF (service) instance towards which the request is redirected'
          schema:
            type: string

    '400':
      description: Bad request
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

    '401':
      description: Unauthorized
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

    '403':
      description: Forbidden
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

    '404':
      description: Not Found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

    '411':
      description: Length Required
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

    '413':
      description: Content Too Large
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

    '415':
      description: Unsupported Media Type
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

    '429':
      description: Too Many Requests
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

    '500':
      description: Internal Server Error
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

    '502':
      description: Bad Gateway
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

    '503':
      description: Service Unavailable
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

    '504':
      description: Gateway Timeout
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
