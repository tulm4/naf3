# ServiceMonitor for NSSAAF Biz Pod
# REQ-15: ServiceMonitor CRDs for HTTP Gateway, Biz Pod, AAA Gateway
# Spec: docs/design/19_observability.md §2.2
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nssaa-biz-monitor
  labels:
    team: platform
    app: nssaa-biz
spec:
  selector:
    matchLabels:
      app: nssaa-biz
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
      - nssaa-system
---
