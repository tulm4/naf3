# compose/dev.yaml
# Local development setup for 3-component NSSAAF architecture.
# Mirrors production topology: HTTP Gateway → Biz Pod → AAA Gateway → Redis → AAA-S mock.

services:
  # ---------------------------------------------------------------------------
  # Redis — shared session correlation store
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    networks:
      - default
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # PostgreSQL — session and audit data store
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nssaa
      POSTGRES_PASSWORD: nssaa
      POSTGRES_DB: nssaa
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nssaa -d nssaa"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # mock-aaa-s — Simulates AAA Server (RADIUS + Diameter)
  # ---------------------------------------------------------------------------
  mock-aaa-s:
    build:
      context: .
      dockerfile: Dockerfile.mock-aaa-s
    image: nssaaf-mock-aaa-s:latest
    ports: ["18120:1812", "38680:3868"]
    networks:
      - default

  # ---------------------------------------------------------------------------
  # AAA Gateway — Diameter/RADIUS transport to AAA-S
  # ---------------------------------------------------------------------------
  aaa-gateway:
    build:
      context: ..
      dockerfile: Dockerfile.aaa-gateway
    image: nssaaf-aaa-gw:latest
    depends_on:
      redis:
        condition: service_healthy
      mock-aaa-s:
        condition: service_started
    volumes:
      - ./configs/aaa-gateway.yaml:/etc/nssAAF/aaa-gateway.yaml:ro
    environment:
      REDIS_ADDR: "redis:6379"
      BIZ_URL: "http://biz:8080"
    ports: ["9090:9090", "18121:1812/udp", "38681:3868"]
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9090/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # NRM — Network Resource Manager / RESTCONF server
  # ---------------------------------------------------------------------------
  nrm:
    build:
      context: ..
      dockerfile: Dockerfile.nrm
    image: nssaaf-nrm:latest
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./configs/nrm.yaml:/etc/nssAAF/nrm.yaml:ro
    ports: ["8081:8081"]
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Biz Pod — EAP engine + N58/N60 SBI
  # ---------------------------------------------------------------------------
  biz:
    build:
      context: ..
      dockerfile: Dockerfile.biz
    image: nssaaf-biz:latest
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      aaa-gateway:
        condition: service_healthy
      nrm:
        condition: service_healthy
    volumes:
      - ./configs/biz.yaml:/etc/nssAAF/biz.yaml:ro
    environment:
      MASTER_KEY_HEX: "6767a7ad0416a19ea174608288761dde35dfabba2a8dda9602fc520b80e1af15"
      POSTGRES_HOST: "postgres"
      REDIS_ADDR: "redis:6379"
      NRF_URL: "http://nrm:8081"
      UDM_URL: "http://nrm:8081"
      AUSF_URL: "http://nrm:8081"
      AAA_GW_URL: "http://aaa-gateway:9090"
    ports: ["8080:8080"]
    networks:
      - default

  # ---------------------------------------------------------------------------
  # HTTP Gateway — TLS terminator, routes AMF → Biz Pod
  # ---------------------------------------------------------------------------
  http-gateway:
    build:
      context: ..
      dockerfile: Dockerfile.http-gateway
    image: nssaaf-http-gw:latest
    depends_on:
      biz:
        condition: service_started
    volumes:
      - ./configs/http-gateway.yaml:/etc/nssAAF/http-gateway.yaml:ro
      - /tmp/e2e-tls:/tmp/e2e-tls:ro
    environment:
      NAF3_AUTH_DISABLED: "1"
    ports: ["8443:8443"]
    networks:
      - default

networks:
  default:
    driver: bridge

volumes:
  postgres_data:
