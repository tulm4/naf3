# compose/test.yaml
# Test isolation overlay extending compose/dev.yaml.
# Run with: docker-compose -f compose/dev.yaml -f compose/test.yaml <command>
version: "3.8"

services:
  # Override: Biz Pod, HTTP GW, AAA GW are started by the test binary.
  # postgres and redis are inherited from dev.yaml but re-bound to test ports.

  # Test-specific PostgreSQL — isolated from dev database.
  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nssaa_test
      POSTGRES_PASSWORD: nssaa_test
      POSTGRES_DB: nssaa_test
    ports: ["5433:5432"]
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nssaa_test -d nssaa_test"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Test-specific Redis — isolated from dev Redis.
  redis_test:
    image: redis:7-alpine
    ports: ["6380:6379"]
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

# Volumes for test data — isolated from dev volumes.
volumes:
  postgres_test_data:
