# NSSAAF Biz Pod configuration for development testing
# Phase 4: NF Integration & Observability — config fixture
# Usage: go run ./cmd/biz/main.go --config=compose/configs/biz.yaml

component: biz
version: "0.1.0"

server:
  addr: ":8080"
  readTimeout: 10s
  writeTimeout: 30s
  idleTimeout: 120s

database:
  host: "${POSTGRES_HOST:-localhost}"
  port: 5432
  name: "nssaa"
  user: "nssaa"
  password: "nssaa"
  maxConns: 20
  minConns: 5
  connMaxLifetime: 30m
  sslMode: "disable"

redis:
  addr: "${REDIS_ADDR:-localhost:6379}"
  password: ""
  db: 0
  poolSize: 50

eap:
  maxRounds: 20
  roundTimeout: 30s
  sessionTtl: 5m

aaa:
  responseTimeout: 10s
  maxRetries: 3
  failureThreshold: 5
  recoveryTimeout: 30s

rateLimit:
  perGpsiPerMin: 10
  perAmfPerSec: 100
  globalPerSec: 1000

logging:
  level: "info"
  format: "json"

metrics:
  enabled: true
  path: "/metrics"

# NRF integration — REQ-01, REQ-02, REQ-03
nrf:
  baseURL: "${NRF_URL:-http://localhost:8081}"
  discoverTimeout: 5s

# UDM integration — REQ-04, REQ-05
udm:
  baseURL: "${UDM_URL:-http://localhost:8082}"
  timeout: 10s

# AUSF integration — REQ-08
ausf:
  baseURL: "${AUSF_URL:-http://localhost:8083}"
  timeout: 10s

biz:
  aaaGatewayUrl: "${AAA_GW_URL:-http://localhost:9090}"
  # mTLS between Biz Pod and AAA Gateway
  useMTLS: false
  tlsCert: "/certs/biz-to-aaa.crt"
  tlsKey: "/certs/biz-to-aaa.key"
  tlsCa: "/certs/aaa-ca.crt"

# Cryptographic key management (Phase 5)
# Modes: soft (default), softhsm (PKCS#11), vault (HashiCorp Vault transit)
crypto:
  keyManager: "soft"  # Change to "vault" for production
  masterKeyHex: "${MASTER_KEY_HEX}"  # Required for soft mode; 64 hex chars (32 bytes)
  kekOverlapDays: 30

  # For vault mode:
  # vault:
  #   address: "http://vault.vault.svc.cluster.local:8200"
  #   keyName: "nssaa-kek"
  #   authMethod: "kubernetes"
  #   k8sRole: "nssaa-vault"
  #
  # For softhsm mode:
  # softHSM:
  #   libraryPath: "/usr/lib/softhsm/libsofthsm2.so"
  #   tokenLabel: "nssaa-kek-token"
  #   pin: "123456"

# Environment variable overrides
# These are set by the deployment tooling (docker-compose, k8s, etc.)
env:
  MASTER_KEY_HEX: ""  # 64-char hex string; REQUIRED for soft mode (set via K8s secret or docker-compose env)
