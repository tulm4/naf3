# NSSAAF Biz Pod configuration for development testing
# Phase 4: NF Integration & Observability — config fixture
# Usage: go run ./cmd/biz/main.go --config=compose/configs/biz.yaml

component: biz
version: "0.1.0"

server:
  addr: ":8080"
  readTimeout: 10s
  writeTimeout: 30s
  idleTimeout: 120s

database:
  host: "localhost"
  port: 5432
  name: "nssaa"
  user: "nssaa"
  password: "nssaa"
  maxConns: 20
  minConns: 5
  connMaxLifetime: 30m
  sslMode: "disable"

redis:
  addr: "localhost:6379"
  password: ""
  db: 0
  poolSize: 50

eap:
  maxRounds: 20
  roundTimeout: 30s
  sessionTtl: 5m

aaa:
  responseTimeout: 10s
  maxRetries: 3
  failureThreshold: 5
  recoveryTimeout: 30s

rateLimit:
  perGpsiPerMin: 10
  perAmfPerSec: 100
  globalPerSec: 1000

logging:
  level: "info"
  format: "json"

metrics:
  enabled: true
  path: "/metrics"

# NRF integration — REQ-01, REQ-02, REQ-03
nrf:
  baseURL: "http://localhost:8081"
  discoverTimeout: 5s

# UDM integration — REQ-04, REQ-05
udm:
  baseURL: "http://localhost:8082"
  timeout: 10s

# AUSF integration — REQ-08
ausf:
  baseURL: "http://localhost:8083"
  timeout: 10s

# Biz Pod component config
biz:
  aaaGatewayUrl: "http://localhost:9090"
  useMTLS: false
