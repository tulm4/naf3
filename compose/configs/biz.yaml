# Biz Pod configuration for NSSAAF
component: biz
version: "0.1.0"

server:
  addr: ":8080"
  readTimeout: 10s
  writeTimeout: 30s
  idleTimeout: 120s

redis:
  addr: "redis:6379"
  password: ""
  db: 0
  poolSize: 50

biz:
  aaaGatewayUrl: "http://aaa-gateway:9090"
  useMTLS: false
  tlsCert: ""
  tlsKey: ""
  tlsCa: ""

eap:
  maxRounds: 20
  roundTimeout: 30s
  sessionTtl: 5m

aaa:
  responseTimeout: 10s
  maxRetries: 3
  failureThreshold: 5
  recoveryTimeout: 30s

logging:
  level: "info"
  format: "json"

metrics:
  enabled: true
  path: "/metrics"
