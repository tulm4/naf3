# NSSAAF HTTP Gateway Configuration
# TLS 1.3 is enabled by default. To use Istio mTLS instead, set ISTIO_MTLS=1 env var.
# When ISTIO_MTLS=1, the HTTP Gateway runs without explicit TLS config (Istio sidecar handles it).
component: http-gateway
version: "0.1.0"

server:
  addr: ":443"
  readTimeout: 10s
  writeTimeout: 30s
  idleTimeout: 120s

httpGateway:
  bizServiceUrl: "http://biz:8080"
  tls:
    cert: "/etc/nssAAF/tls/server.crt"
    key: "/etc/nssAAF/tls/server.key"
    ca: "/etc/nssAAF/tls/ca.crt"

logging:
  level: "info"
  format: "json"

metrics:
  enabled: true
  path: "/metrics"

env:
  ISTIO_MTLS: "0"
