# HTTP Gateway configuration for NSSAAF
component: http-gateway
version: "0.1.0"

server:
  addr: ":443"
  readTimeout: 10s
  writeTimeout: 30s
  idleTimeout: 120s

httpGateway:
  bizServiceUrl: "http://biz:8080"
  tls:
    cert: "/etc/nssAAF/tls/server.crt"
    key: "/etc/nssAAF/tls/server.key"
    ca: "/etc/nssAAF/tls/ca.crt"

logging:
  level: "info"
  format: "json"

metrics:
  enabled: true
  path: "/metrics"
