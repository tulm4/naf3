# NSSAAF HTTP Gateway Configuration
# TLS 1.3 is enabled by default. To use Istio mTLS instead, set ISTIO_MTLS=1 env var.
# When ISTIO_MTLS=1, the HTTP Gateway runs without explicit TLS config (Istio sidecar handles it).
component: http-gateway
version: "0.1.0"

server:
  addr: ":8443"
  readTimeout: 10s
  writeTimeout: 30s
  idleTimeout: 120s

httpGateway:
  bizServiceUrl: "http://localhost:8080"
  tls:
    cert: "/tmp/e2e-tls/server.crt"
    key: "/tmp/e2e-tls/server.key"
    ca: "/tmp/e2e-tls/server.crt"

logging:
  level: "info"
  format: "json"

metrics:
  enabled: true
  path: "/metrics"

crypto:
  keyManager: "soft"
  masterKeyHex: "0102030405060708091011121314151617181920212223242526272829303132"

env:
  ISTIO_MTLS: "0"
