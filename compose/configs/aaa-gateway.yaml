# AAA Gateway configuration for NSSAAF
component: aaa-gateway
version: "0.1.0"

server:
  addr: ":9090"
  readTimeout: 10s
  writeTimeout: 30s
  idleTimeout: 120s

redis:
  addr: "${REDIS_ADDR:-localhost:6379}"
  password: ""
  db: 0
  poolSize: 50

aaaGateway:
  bizServiceUrl: "${BIZ_URL:-http://localhost:8080}"
  listenRadius: ":1812"
  listenDiameter: ":3868"
  diameterProtocol: "tcp"
  # Diameter client-initiated config (see PLAN §2.3.5):
  # Required for DER/DEA forwarding to AAA-S. Without these, DIAMETER transport silently fails.
  diameterServerAddress: "mock-aaa-s:3868"   # AAA-S address (compose service name)
  diameterRealm: "operator.com"                     # AAA-S realm (Origin-Realm in CER)
  diameterHost: "nssaa-gw.operator.com"            # Origin-Host for CER (AAA Gateway identity)
  # RADIUS client-initiated config:
  # Required for Access-Request forwarding to AAA-S. Disabled if empty.
  radiusServerAddress: "mock-aaa-s:1812"      # AAA-S RADIUS address (compose service name)
  radiusSharedSecret: "secret"                      # Shared secret with AAA-S
  redisMode: "standalone"
  keepalivedStatePath: "/var/run/keepalived/state"

logging:
  level: "info"
  format: "json"

metrics:
  enabled: true
  path: "/metrics"

# Required by config.Validate() even though AAA Gateway doesn't use crypto.
crypto:
  keyManager: "soft"
  masterKeyHex: "0102030405060708091011121314151617181920212223242526272829303132"
