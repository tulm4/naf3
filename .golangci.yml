# .golangci.yml — golangci-lint configuration
# Compatible with golangci-lint v1.x
linters:
  enable:
    - errcheck       # Check for unchecked errors
    - gosimple       # Simplify code
    - govet          # Report suspicious code
    - ineffassign    # Detect unused variable assignments
    - staticcheck    # Static analysis checks
    - unused         # Check for unused code
    - bodyclose      # Ensure response body is closed
    - contextcheck   # Check context.Context usage
    - durationcheck  # Check for unhandled time.Duration
    - errorlint      # Check for errors in loops
    - goconst        # Find repeated constants
    - gocyclo        # Check cyclomatic complexity
    - gofmt          # Check code formatting
    - goimports      # Fix import formatting
    - misspell       # Find spelling mistakes
    - nakedret       # Check for naked returns
    - noctx          # Detect http.Handler without context
    - prealloc       # Detect pre-allocations
    - revive         # Custom linter rules
    - unconvert      # Detect unnecessary type conversions
    - unparam        # Detect unused function parameters

linters-settings:
  revive:
    rules:
      - name: var-naming
      - name: exported
        severity: warning
  govet:
    enable-all: true
  errorlint:
    errorf: true
  gocyclo:
    min-complexity: 15

run:
  timeout: 5m
  tests: true

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # Fieldalignment is not a practical concern for data/response structs where
    # the theoretical minimum cannot be achieved with any field ordering on 64-bit.
    # We suppress it globally since these structs are intentional data containers.
    - linters:
        - govet
      text: "fieldalignment"
    # SA4003 fires for SST > 255 check which is defense-in-depth after JSON unmarshal.
    # The uint8 type guarantees the value; the check protects programmatic construction.
    - path: "snssai.go"
      linters:
        - staticcheck
      text: "SA4003"
    # EapIdRsp is the 3GPP spec field name, not Go conventional spelling.
    - path: "internal/api/aiw/request.go"
      linters:
        - revive
      text: "struct field EapIdRsp"
